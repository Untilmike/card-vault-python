{% extends 'base.html' %}
{% block content %}
<h2>🧾 Create Invoice</h2>
<div class="form-box">
  <form method="GET" action="/invoices/create">
    <label>Step 1 — Select Customer</label>
    <select name="customer_id" onchange="this.form.submit()">
      <option value="">-- Choose a customer --</option>
      {% for c in customers %}
      <option value="{{ c.customer_id }}"
        {{ 'selected' if selected_cid|string == c.customer_id|string }}>
        {{ c.full_name }}
      </option>
      {% endfor %}
    </select>
  </form>

  {% if cards %}
  <form method="POST" action="/invoices/create" style="margin-top:4px">
    <input type="hidden" name="customer_id" value="{{ selected_cid }}">
    <label>Step 2 — Select Saved Card</label>
    <select name="card_id" required>
      <option value="">-- Choose a card --</option>
      {% for card in cards %}
      <option value="{{ card.card_id }}">
        {{ card.card_type }} ending in {{ card.last_four }}
      </option>
      {% endfor %}
    </select>
    <label>Step 3 — Amount (KES)</label>
    <input name="amount" type="number" step="0.01" min="1"
           placeholder="e.g. 1500.00" required>
    <button type="submit" class="btn btn-g">Create Invoice</button>
    <a href="/invoices" class="btn" style="margin-left:8px">Cancel</a>
  </form>
  {% elif selected_cid %}
  <p style="color:#e74c3c;margin-top:16px;font-size:13px">
    This customer has no saved cards.
    <a href="/cards/add?customer_id={{ selected_cid }}">Add a card first →</a>
  </p>
  {% endif %}
</div>
{% endblock %}
